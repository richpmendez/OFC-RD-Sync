<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OFC Spec Sheet Builder</title>
<script src="https://unpkg.com/docx@8.5.0/build/index.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--g1:#1b3d1c;--g2:#2d6a2f;--g3:#4a9e4d;--gp:#e8f5e9;--bd:#d0d7de;--tx:#1a1a1a;--mt:#6b7280;--bg:#f5f7f5;--wh:#ffffff}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh}
/* HEADER */
.hdr{background:var(--g1);color:#fff;padding:10px 24px;display:flex;align-items:center;gap:14px;box-shadow:0 2px 6px rgba(0,0,0,.3)}
.hdr img{height:36px}
.hdr h1{font-size:17px;font-weight:600;letter-spacing:.01em}
.hdr .badge{margin-left:auto;background:rgba(255,255,255,.15);padding:4px 10px;border-radius:20px;font-size:11px}
/* STEPS */
.steps{background:var(--wh);border-bottom:1px solid var(--bd);display:flex;padding:0 24px}
.step{padding:13px 18px;font-size:12px;color:var(--mt);border-bottom:2px solid transparent;cursor:pointer;display:flex;align-items:center;gap:6px}
.step .num{width:20px;height:20px;border-radius:50%;background:var(--bd);color:var(--wh);display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:700}
.step.active{color:var(--g2);border-bottom-color:var(--g2)}
.step.active .num{background:var(--g2)}
.step.done{color:var(--g3)}
.step.done .num{background:var(--g3)}
/* MAIN */
.main{max-width:1280px;margin:0 auto;padding:24px}
/* LINE GRID */
.line-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px;margin-top:8px}
.line-card{background:var(--wh);border:2px solid var(--bd);border-radius:10px;padding:18px;cursor:pointer;transition:border .15s,transform .1s;position:relative}
.line-card:hover{border-color:var(--g2);transform:translateY(-2px)}
.line-card.sel{border-color:var(--g2);background:var(--gp)}
.line-card .lc-icon{font-size:28px;margin-bottom:8px}
.line-card h3{font-size:13px;font-weight:700;margin-bottom:4px}
.line-card p{font-size:11px;color:var(--mt)}
.line-card .sel-dot{position:absolute;top:10px;right:10px;width:16px;height:16px;border-radius:50%;background:var(--g2);display:none}
.line-card.sel .sel-dot{display:block}
/* LAYOUT */
.two-col{display:grid;grid-template-columns:1fr 440px;gap:20px}
@media(max-width:900px){.two-col{grid-template-columns:1fr}}
.panel{background:var(--wh);border:1px solid var(--bd);border-radius:10px;padding:22px}
.panel-title{font-size:14px;font-weight:700;margin-bottom:16px;color:var(--g1);display:flex;align-items:center;gap:8px}
.panel-title span{font-size:18px}
/* FORM */
.field-section{margin-bottom:20px}
.fs-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--mt);margin-bottom:10px;padding-bottom:5px;border-bottom:1px solid #eee}
.fg{margin-bottom:12px}
.fg label{display:block;font-size:12px;font-weight:600;margin-bottom:3px}
.fg label .hint{font-weight:400;color:var(--mt);font-size:11px}
.fg input,.fg textarea,.fg select{width:100%;padding:7px 10px;border:1px solid var(--bd);border-radius:6px;font-size:12px;font-family:inherit;background:var(--wh)}
.fg textarea{min-height:68px;resize:vertical}
.fg input:focus,.fg textarea:focus,.fg select:focus{outline:none;border-color:var(--g2);box-shadow:0 0 0 3px rgba(45,106,47,.1)}
.fg .default-btn{font-size:11px;color:var(--g2);cursor:pointer;margin-top:3px;background:none;border:none;padding:0;text-decoration:underline}
.radio-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
.ro{display:flex;align-items:center;gap:5px;padding:5px 10px;border:1px solid var(--bd);border-radius:5px;cursor:pointer;font-size:12px;user-select:none}
.ro input{accent-color:var(--g2)}
.ro:has(input:checked){border-color:var(--g2);background:var(--gp)}
/* PREVIEW */
.preview-scroll{max-height:calc(100vh - 200px);overflow-y:auto;border:1px solid #ddd;border-radius:6px;padding:14px;background:#fff}
/* SPEC SHEET PREVIEW */
.sp{font-family:'Calibri','Segoe UI',sans-serif;font-size:10.5px;line-height:1.55;color:#111}
.sp-hdr-wrap{display:flex;align-items:center;margin-bottom:10px;border-bottom:1px solid #ccc;padding-bottom:8px}
.sp-logo{height:38px;margin-right:12px}
.sp-co{text-align:center;flex:1;font-size:11px}
.sp-co strong{font-size:13px;display:block}
.sp-title-block{border-top:3px solid #000;border-bottom:3px solid #000;text-align:center;font-weight:700;font-size:13px;padding:4px 0;margin-bottom:10px}
.sp-row{display:grid;grid-template-columns:130px 1fr;gap:4px;margin-bottom:5px}
.sp-lbl{font-weight:700;text-transform:uppercase;font-size:10px}
.sp-val{font-size:10.5px}
.sp-sec{font-weight:700;text-transform:uppercase;font-size:10px;margin-top:10px;margin-bottom:3px}
.sp-sub{display:grid;grid-template-columns:130px 1fr;gap:4px;margin-left:130px;margin-bottom:2px;font-size:10px}
.sp-sub .k{color:#333}
.sp-indent{margin-left:130px;font-size:10px;margin-bottom:3px}
.sp table{margin-left:130px;border-collapse:collapse;font-size:9.5px;margin-top:3px}
.sp table th,.sp table td{border:1px solid #444;padding:2px 6px}
.sp table th{font-weight:700;background:#fff}
.sp table .c{text-align:center}
.sp-nfp{margin-left:130px;border:1px solid #aaa;padding:18px;text-align:center;font-style:italic;color:#777;font-size:10px;margin-top:4px}
/* SUMMARY */
.sum-grid{display:grid;gap:8px}
.sum-row{display:flex;gap:10px;font-size:12px;padding:6px 0;border-bottom:1px solid #f0f0f0}
.sum-lbl{font-weight:600;min-width:150px;color:var(--mt);font-size:11px}
.sum-val{flex:1}
.tbd{color:#c77}
/* BUTTONS */
.btn{padding:9px 18px;border-radius:6px;border:none;cursor:pointer;font-size:13px;font-weight:500;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.btn-p{background:var(--g2);color:#fff}.btn-p:hover{background:var(--g1)}
.btn-s{background:var(--wh);color:var(--tx);border:1px solid var(--bd)}.btn-s:hover{background:var(--bg)}
.btn-sm{padding:6px 12px;font-size:11px}
.btn-row{display:flex;gap:8px;margin-top:18px;flex-wrap:wrap}
/* EXPORT */
.ex-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:4px}
@media(max-width:700px){.ex-grid{grid-template-columns:1fr}}
.ex-card{background:var(--wh);border:1px solid var(--bd);border-radius:10px;padding:20px;text-align:center}
.ex-card .icon{font-size:32px;margin-bottom:8px}
.ex-card h3{font-size:13px;font-weight:700;margin-bottom:6px}
.ex-card p{font-size:11px;color:var(--mt);margin-bottom:12px}
/* ASANA */
.asana-box{background:var(--wh);border:1px solid var(--bd);border-radius:10px;padding:20px;margin-top:18px}
.asana-box h3{font-size:14px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.task-preview{background:#f7f7f7;border-radius:6px;padding:14px;font-size:11px;font-family:monospace;white-space:pre-wrap;max-height:200px;overflow-y:auto;color:#333}
/* TOAST */
.toast{position:fixed;bottom:20px;right:20px;background:#222;color:#fff;padding:10px 18px;border-radius:8px;font-size:12px;z-index:999;animation:toastIn .2s ease}
@keyframes toastIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
/* HIDDEN */
.hidden{display:none!important}
/* LOADING */
.spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
/* PRINT */
@media print{
  .hdr,.steps,.btn-row,.ex-grid,.asana-box,.form-panel-col,.panel-actions{display:none!important}
  .two-col{grid-template-columns:1fr!important}
  .preview-scroll{max-height:none!important;border:none!important;overflow:visible!important}
  body{background:#fff}
}
/* SECTION HEADING */
.sec-hd{font-size:15px;font-weight:700;margin-bottom:6px;color:var(--g1)}
.sec-sub{font-size:12px;color:var(--mt);margin-bottom:18px}
</style>
</head>

// APP STATE
// ─────────────────────────────────────────
const state={step:1,lineId:null,formData:{}};

// ─────────────────────────────────────────
// UTILS
// ─────────────────────────────────────────
function $(id){return document.getElementById(id)}
function toast(msg,ms=2000){
  const t=document.createElement('div');t.className='toast';t.textContent=msg;
  document.body.appendChild(t);setTimeout(()=>t.remove(),ms);
}
function setLogoSrc(){
  // Use the full logo from assets
  try{$('header-logo').src='data:image/png;base64,'+LOGO_FULL;}
  catch(e){}
}

function updateSteps(){
  document.querySelectorAll('.step').forEach(el=>{
    const s=+el.dataset.step;
    el.className='step'+(s===state.step?' active':s<state.step?' done':'');
  });
}

// ─────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────
function render(){
  updateSteps();
  const root=$('app-root');
  if(state.step===1) root.innerHTML=renderStep1();
  else if(state.step===2) root.innerHTML=renderStep2();
  else if(state.step===3) root.innerHTML=renderStep3();
  else if(state.step===4) root.innerHTML=renderStep4();
  attachHandlers();
}

// ── STEP 1: Product Line ─────────────────
function renderStep1(){

// ── STEP 2: Form ─────────────────────────
function fGroup(id,label,hint,type='text',val='',extraAttrs=''){
  const v=val||'';
  if(type==='textarea') return`<div class="fg"><label>${label}${hint?` <span class="hint">${hint}</span>`:''}
    </label><textarea id="${id}" ${extraAttrs}>${v}</textarea></div>`;
  return`<div class="fg"><label>${label}${hint?` <span class="hint">${hint}</span>`:''}
    </label><input type="${type}" id="${id}" value="${v.replace(/"/g,'&quot;')}" ${extraAttrs}></div>`;
}
function fRadio(id,label,opts,val){
  const btns=opts.map(o=>`<label class="ro"><input type="radio" name="${id}" value="${o.v}"${val===o.v?' checked':''}> ${o.l}</label>`).join('');
  return`<div class="fg"><label>${label}</label><div class="radio-row">${btns}</div></div>`;
}
function renderStep2(){

  // Base sections

  <div class="form-panel-col">
  <div class="panel">

  // Basic info
  html+=`<div class="field-section"><div class="fs-label">Basic Info</div>
    ${fGroup('productName','Product Name','',  'text',d.productName||'')}
    ${fGroup('itemNumber','Item Number','(or TBD)','text',d.itemNumber||'TBD')}
    ${fGroup('description','Description','',  'textarea',d.description||'')}

  // Aseptic-specific pack format
  if(state.lineId==='aseptic'){
    html+=`<div class="field-section"><div class="fs-label">Pack Formats</div>
      ${fRadio('packFormats','Pack formats included',[{v:'drum',l:'Drum only'},{v:'tote',l:'Tote only'},{v:'both',l:'Both'}],d.packFormats||'drum')}

  // Cocktail cherry jar sizes

      ${fGroup('tenOzUpc','10 oz Jar UPC','',  'text',d.tenOzUpc||'041345000423')}

  }
  // GTINs
  html+=`<div class="field-section"><div class="fs-label">Identifiers</div>

  // Ingredients
  html+=`<div class="field-section"><div class="fs-label">Formula</div>
    ${fGroup('ingredients','Ingredient Statement','in descending order by weight','textarea',d.ingredients||'')}

  </div>`;

  // Physical properties
  html+=`<div class="field-section"><div class="fs-label">Physical Properties</div>
    ${fGroup('brix','Brix Range','e.g., 28.0° – 33.0°','text',d.brix||'')}
    ${fGroup('ph','pH Range','e.g., 2.50 – 3.40','text',d.ph||'')}
    ${state.lineId!=='canned'&&state.lineId!=='cocktail-cherries'?fGroup('viscosity','Viscosity',ln.viscHint,'text',d.viscosity||''):''}
    ${state.lineId==='aseptic'?fGroup('specificGravity','Specific Gravity','e.g., 1.040 – 1.070','text',d.specificGravity||''):''}
    ${ef.includes('pieceSize')?fGroup('pieceSize','Piece Size','e.g., Chunky pieces should pass through a 6.0 mm straw','text',d.pieceSize||''):''}
    ${fGroup('color','Color Description','','text',d.color||'')}
    ${fGroup('flavor','Flavor Description','','text',d.flavor||'')}
    ${state.lineId==='aseptic'?fGroup('aroma','Aroma Description','','text',d.aroma||''):''}
    ${state.lineId==='aseptic'?fGroup('defects','Defects','','text',d.defects||'Free from foreign material'):''}

    ${state.lineId==='canned'?fGroup('minDrainedWeight','Minimum Drained Weight/Can','e.g., 272.0 g (9.6 oz)','text',d.minDrainedWeight||''):''}
    ${ef.includes('daysAfterOpening')?fGroup('daysAfterOpening','Days After Opening','default: '+ln.defaultDays,'text',d.daysAfterOpening||ln.defaultDays):''}
    ${state.lineId==='shelf-stable-conc'?fGroup('dilutionRatio','Dilution Ratio','e.g., 4+1','text',d.dilutionRatio||''):''}
    ${state.lineId==='shelf-stable-conc'?fGroup('juiceContent','Juice Content When Prepared','e.g., 9% juice when prepared as 4+1','text',d.juiceContent||''):''}
  </div>`;

  // Weight & Origin
  if(state.lineId!=='aseptic'&&state.lineId!=='canned'&&state.lineId!=='cocktail-cherries'){
    html+=`<div class="field-section"><div class="fs-label">Weights & Origin</div>
      ${fGroup('netWeight','Net Weight / Case',ln.defaultNet?`default: ${ln.defaultNet}`:'','text',d.netWeight||ln.defaultNet||'')}
      ${fGroup('grossWeight','Gross Ship Weight / Case',ln.defaultGross?`default: ${ln.defaultGross}`:'','text',d.grossWeight||ln.defaultGross||'')}
      ${fRadio('countryOfOrigin','Country of Origin',[{v:'imported',l:'Imported'},{v:'domestic and imported',l:'Domestic & Imported'},{v:'USA',l:'USA'}],d.countryOfOrigin||'imported')}
    </div>`;
  } else if(state.lineId==='aseptic'){
    html+=`<div class="field-section"><div class="fs-label">Origin</div>
      ${fRadio('countryOfOrigin','Country of Origin',[{v:'imported',l:'Imported'},{v:'domestic and imported',l:'Domestic & Imported'},{v:'USA',l:'USA'}],d.countryOfOrigin||'imported')}
    </div>`;
  }

  html+=`<div class="btn-row">
    <button class="btn btn-s" id="step2-back">← Back</button>
    <button class="btn btn-p" id="step2-next">Review Summary →</button>
  </div></div></div>

  <!-- PREVIEW PANE -->
  <div>
    <div class="panel">
      <div class="panel-title"><span>👁</span> Live Preview</div>
      <div class="preview-scroll" id="preview-pane">${buildPreview(d)}</div>
    </div>
  </div>
  </div>`;
  return html;
}

// ─────────────────────────────────────────
// PREVIEW BUILDER
// ─────────────────────────────────────────
function buildPreview(d){
  if(!state.lineId) return'<p style="color:var(--mt);font-size:12px">Select a product line to see the preview.</p>';
  const ln=LINES[state.lineId];
  const origin=d.countryOfOrigin||'imported';
  const status=ln.statusFn(origin);
  const best=typeof ln.bestUsedFn==='function'?ln.bestUsedFn(d.daysAfterOpening):ln.bestUsed;
  const ship=ln.shippingFn(d);

  let html=`<div class="sp">
  <div class="sp-hdr-wrap">
    <img class="sp-logo" src="data:image/png;base64,${LOGO_FULL}" alt="OFC">
    <div class="sp-co"><strong>The Oregon Fruit Company</strong>3180 22nd St SE, Salem, OR 97302 USA</div>
  </div>
  <div class="sp-title-block">PRODUCT SPECIFICATION</div>`;

  // Core rows
  const row=(lbl,val)=>`<div class="sp-row"><div class="sp-lbl">${lbl}</div><div class="sp-val">${val||'TBD'}</div></div>`;
  html+=row('PRODUCT:',d.productName);
  html+=row('ITEM NUMBER:',state.lineId==='aseptic'?`${d.drumItemNumber||'TBD'} (drum) / ${d.toteItemNumber||'TBD'} (tote)`:d.itemNumber);
  html+=row('DESCRIPTION:',d.description);
  html+=row('INGREDIENTS:',d.ingredients);
  if(state.lineId==='canned'&&d.ingredientPct) html+=`<div class="sp-row"><div class="sp-lbl" style="font-size:9px;font-weight:700">INGRED. PRIOR TO<br>PACKAGING:</div><div class="sp-val">${d.ingredientPct}</div></div>`;
  html+=`<div class="sp-row"><div class="sp-lbl">PROCESSING:</div><div class="sp-val" style="white-space:pre-line">${ln.processing}</div></div>`;

  // Physical properties
  html+=`<div class="sp-sec">PHYSICAL PROPERTIES:${state.lineId==='aseptic'?' (physical properties vary due to seasonal variation of agricultural commodities)':''}</div>`;
  if(d.brix) html+=`<div class="sp-sub"><div class="k">Brix:</div><div>${d.brix}</div></div>`;
  if(d.ph) html+=`<div class="sp-sub"><div class="k">pH:</div><div>${d.ph}</div></div>`;
  if(d.viscosity) html+=`<div class="sp-sub"><div class="k">Viscosity:</div><div>${d.viscosity}</div></div>`;
  if(d.specificGravity) html+=`<div class="sp-sub"><div class="k">Specific Gravity:</div><div>${d.specificGravity}</div></div>`;
  if(d.pieceSize) html+=`<div class="sp-sub"><div class="k">Piece Size:</div><div>${d.pieceSize}</div></div>`;
  if(state.lineId==='frozen-smooth') html+=`<div class="sp-sub"><div class="k">Piece Size:</div><div>Pourable and smooth</div></div>`;
  if(d.color) html+=`<div class="sp-sub"><div class="k">Color:</div><div>${d.color}</div></div>`;
  if(d.flavor) html+=`<div class="sp-sub"><div class="k">Flavor:</div><div>${d.flavor}</div></div>`;
  if(d.aroma) html+=`<div class="sp-sub"><div class="k">Aroma:</div><div>${d.aroma}</div></div>`;
  if(d.defects) html+=`<div class="sp-sub"><div class="k">Defects:</div><div>${d.defects}</div></div>`;
  if(d.pitsStems) html+=`<div class="sp-sub"><div class="k">Pits/Stems:</div><div>${d.pitsStems}</div></div>`;

  // Grade standards (canned)
  if(state.lineId==='canned'){
    html+=`<div class="sp-sec">GRADE STANDARDS:</div>`;
    if(d.colorGrade) html+=`<div class="sp-sub"><div class="k">Color:</div><div>${d.colorGrade}</div></div>`;
    if(d.defectsGrade) html+=`<div class="sp-sub"><div class="k">Defects:</div><div>${d.defectsGrade}</div></div>`;
    if(d.characterGrade) html+=`<div class="sp-sub"><div class="k">Character:</div><div>${d.characterGrade}</div></div>`;
  }

  // Micro spec table
  if(ln.microRows&&ln.microRows.length){
    html+=`<div class="sp-sec">MICROBIOLOGICAL SPECIFICATIONS:</div>
    <table><tr><th>Test</th><th class="c">Limit</th><th class="c">Method</th></tr>
    ${ln.microRows.map(r=>`<tr><td>${r[0]}</td><td class="c">${r[1]}</td><td class="c">${r[2]}</td></tr>`).join('')}
    </table>`;
  }

  // Metal detection
  const mNote=ln.metalNote==='inline'?'During production, inline metal detectors are challenged and calibrated hourly for adequate sensitivity to and rejection of the following test pieces:':ln.metalNote==='belt'?'During production, belt metal detectors are challenged and calibrated hourly for adequate sensitivity to and rejection of the following test pieces:':'The metal detector is continuously monitored and challenged at defined intervals for adequate sensitivity to and rejection of the following test pieces:';
  html+=`<div class="sp-sec">METAL DETECTION:</div>
  <div class="sp-indent">${mNote}</div>
  <div class="sp-sub"><div class="k">• Ferrous</div><div>${ln.metalF}</div></div>
  <div class="sp-sub"><div class="k">• Non-Ferrous</div><div>${ln.metalN}</div></div>
  <div class="sp-sub"><div class="k">• Stainless Steel</div><div>${ln.metalS}</div></div>`;

  // Packaging
  html+=`<div class="sp-sec">PACKAGING:</div><div class="sp-indent">${ln.packagingText}</div>`;

  // Lot code
  html+=`<div class="sp-sec">LOT CODE FORMAT:</div><div class="sp-indent" style="white-space:pre-line">${ln.lotCode}</div>`;

  // Identifiers
  if(state.lineId!=='aseptic') html+=row('GTIN:',d.caseGtin);
  else html+=row('GTIN:',d.caseGtin||'See packaging');

  // Status
  html+=`<div class="sp-row"><div class="sp-lbl">STATUS:</div><div class="sp-val">${status}</div></div>`;

  // Best used by + storage
  if(best&&best.length){
    html+=`<div class="sp-sec">${state.lineId==='aseptic'?'EXPIRY AND STORAGE:':'BEST USED BY:'}</div>`;
    best.forEach(b=>html+=`<div class="sp-indent">${b}</div>`);
  }
  if(state.lineId!=='aseptic'){
    html+=`<div class="sp-sec">STORAGE:</div><div class="sp-indent">${ln.storage}</div>`;
  }

  // Shipping
  html+=`<div class="sp-sec">SHIPPING INFORMATION:</div>`;
  ship.forEach(([k,v])=>html+=`<div class="sp-sub"><div class="k">${k}</div><div>${v}</div></div>`);

  // Boilerplate
  html+=`<div class="sp-sec">ALLERGENS:</div><div class="sp-indent">${ALLERGEN}</div>`;
  html+=`<div class="sp-sec">NON-GMO:</div><div class="sp-indent">${NONGMO}</div>`;
  html+=`<div class="sp-sec">SAFETY DATA SHEET (SDS):</div><div class="sp-indent">${SDS_STMT}</div>`;
  if(ln.hasGRAS) html+=`<div class="sp-sec">GRAS:</div><div class="sp-indent">${d.productName||'This product'} is generally recognized as safe as defined in 21 CFR 170.30(b)(2).</div>`;
  html+=`<div class="sp-sec">NUTRITIONAL INFORMATION:</div><div class="sp-nfp">[Insert Nutrition Facts panel here]</div>`;

  html+=`</div>`;
  return html;
}

// ASANA TASK BUILDER

function buildAsanaTask(){
  const d=state.formData;
  const ln=LINES[state.lineId];
  const today=new Date().toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric'});
  return`Task Name: [Customer] — ${d.productName||'New Product'}

Product Line: ${ln.name}
Status: Bench Trial
Due Date: [TBD]

Description:
${d.productName||'New product'} (${ln.name})
Brix: ${d.brix||'TBD'}  |  pH: ${d.ph||'TBD'}  |  Viscosity: ${d.viscosity||'TBD'}
Country of Origin: ${d.countryOfOrigin||'TBD'}
Ingredients: ${d.ingredients?d.ingredients.substring(0,100)+'…':'TBD'}

Comment (v1.0 created ${today}):
Formula v1.0 created. Bench trial pending.
${!d.brix||!d.ph?'TBD fields: '+['Brix','pH','Viscosity','Color','Flavor'].filter(f=>!d[f.toLowerCase()]).join(', '):'All core physical properties captured.'}`;
}

// ─────────────────────────────────────────
// PLAIN TEXT SPEC
// ─────────────────────────────────────────
function buildPlainText(){
  const d=state.formData;
  const ln=LINES[state.lineId];
  const origin=d.countryOfOrigin||'imported';
  const status=ln.statusFn(origin);
  const best=typeof ln.bestUsedFn==='function'?ln.bestUsedFn(d.daysAfterOpening):ln.bestUsed;
  const ship=ln.shippingFn(d);
  const pad=(lbl,val)=>`${lbl.padEnd(28)}${val||'TBD'}`;
  let t='';
  t+='PRODUCT SPECIFICATION\n';
  t+='═'.repeat(60)+'\n\n';
  t+=pad('PRODUCT:',d.productName)+'\n';
  t+=pad('ITEM NUMBER:',d.itemNumber)+'\n';
  t+=pad('DESCRIPTION:','')+'\n  '+d.description+'\n';
  t+=pad('INGREDIENTS:','')+'\n  '+d.ingredients+'\n';
  t+=pad('PROCESSING:','')+'\n  '+ln.processing+'\n\n';
  t+='PHYSICAL PROPERTIES:\n';
  if(d.brix) t+='  Brix: '+d.brix+'\n';
  if(d.ph) t+='  pH: '+d.ph+'\n';
  if(d.viscosity) t+='  Viscosity: '+d.viscosity+'\n';
  if(d.color) t+='  Color: '+d.color+'\n';
  if(d.flavor) t+='  Flavor: '+d.flavor+'\n';
  t+='\nMICROBIOLOGICAL SPECIFICATIONS:\n';
  ln.microRows.forEach(r=>t+=`  ${r[0].padEnd(24)}${r[1].padEnd(20)}${r[2]}\n`);
  t+='\nMETAL DETECTION:\n';
  t+=`  Ferrous: ${ln.metalF}  |  Non-Ferrous: ${ln.metalN}  |  Stainless Steel: ${ln.metalS}\n`;
  t+='\nPACKAGING:\n  '+ln.packagingText+'\n';
  t+='\nLOT CODE FORMAT:\n  '+ln.lotCode+'\n';
  t+='\nGTIN: '+(d.caseGtin||'TBD')+'\n';
  t+='\nSTATUS: '+status+'\n';
  if(best) t+='\nBEST USED BY:\n'+best.map(b=>'  '+b).join('\n')+'\n';
  t+='\nSTORAGE:\n  '+ln.storage+'\n';
  t+='\nSHIPPING INFORMATION:\n'+ship.map(([k,v])=>`  ${k.padEnd(22)}${v}`).join('\n')+'\n';
  t+='\nALLERGENS:\n  '+ALLERGEN+'\n';
  t+='\nNON-GMO:\n  '+NONGMO+'\n';
  t+='\nSAFETY DATA SHEET (SDS):\n  '+SDS_STMT+'\n';
  if(ln.hasGRAS) t+='\nGRAS:\n  '+(d.productName||'This product')+' is generally recognized as safe as defined in 21 CFR 170.30(b)(2).\n';
  t+='\nNUTRITIONAL INFORMATION:\n  [Insert Nutrition Facts panel here]\n';
  return t;
}

// ─────────────────────────────────────────
// DOCX GENERATION
// ─────────────────────────────────────────
async function generateDocx(){
  const {Document,Packer,Paragraph,TextRun,Table,TableRow,TableCell,
    Header,Footer,AlignmentType,BorderStyle,WidthType,TabStopType,
    ImageRun,VerticalAlign}=window.docx;

  const d=state.formData;
  const ln=LINES[state.lineId];
  const origin=d.countryOfOrigin||'imported';
  const status=ln.statusFn(origin);
  const best=typeof ln.bestUsedFn==='function'?ln.bestUsedFn(d.daysAfterOpening):ln.bestUsed;
  const ship=ln.shippingFn(d);
  const today=new Date().toISOString().split('T')[0];

  // Logo bytes
  const logoRes=await fetch('data:image/png;base64,'+LOGO_FULL);
  const logoBuf=await logoRes.arrayBuffer();
  const logoBytes=new Uint8Array(logoBuf);

  const FONT='Calibri';
  const SZ=20;
  const TAB=2000;
  const nb={style:BorderStyle.NONE,size:0,color:'FFFFFF'};
  const nbs={top:nb,bottom:nb,left:nb,right:nb};
  const bd={style:BorderStyle.SINGLE,size:4,color:'000000'};

  function run(text,opts={}){
    return new TextRun({text,font:FONT,size:opts.size||SZ,bold:opts.bold||false,
      color:opts.color||'000000',italics:opts.italic||false});
  }
  function sp(pts=80){return new Paragraph({spacing:{after:pts},children:[]});}
  function lv(label,value){
    return new Paragraph({spacing:{after:60},
      tabStops:[{type:TabStopType.LEFT,position:TAB}],
      children:[run(label,{bold:true}),run('\t'),run(value||'TBD')]});
  }
  function lm(label,body){
    return new Paragraph({spacing:{after:80},
      indent:{left:TAB,hanging:TAB},
      tabStops:[{type:TabStopType.LEFT,position:TAB}],
      children:[run(label,{bold:true}),run('\t'),run(body||'')]});
  }
  function ld(label,body){
    return[new Paragraph({spacing:{after:0},children:[run(label,{bold:true})]}),
      new Paragraph({spacing:{after:80},indent:{left:TAB},children:[run(body||'')]})];
  }
  function sh(text){
    return new Paragraph({spacing:{before:200,after:80},children:[run(text,{bold:true})]});
  }
  function sr(label,value){
    return new Paragraph({spacing:{after:0},indent:{left:TAB},
      tabStops:[{type:TabStopType.LEFT,position:TAB}],
      children:[run(label),run('\t'),run(value||'')]});
  }
  function shipRow(label,value){
    return new Paragraph({spacing:{after:0},indent:{left:TAB},
      tabStops:[{type:TabStopType.LEFT,position:TAB+1600}],
      children:[run(label),run('\t'),run(value||'')]});
  }
  function metalRow(name,value){
    return new Paragraph({spacing:{after:0},indent:{left:TAB},
      tabStops:[{type:TabStopType.LEFT,position:TAB+1700}],
      children:[run('• '+name),run('\t'),run(value||'')]});
  }
  function cell(text,opts={}){
    return new TableCell({borders:{top:bd,bottom:bd,left:bd,right:bd},
      width:{size:opts.width,type:WidthType.DXA},
      margins:{top:60,bottom:60,left:100,right:100},
      children:[new Paragraph({alignment:opts.align||AlignmentType.LEFT,
        children:[run(text,{bold:opts.bold||false})]})]});
  }

  const HW=2500,MW=9360-2*2500;
  const docHeader=new Header({children:[
    new Table({width:{size:9360,type:WidthType.DXA},columnWidths:[HW,MW,HW],
      borders:{top:nb,bottom:nb,left:nb,right:nb,insideHorizontal:nb,insideVertical:nb},
      rows:[new TableRow({children:[
        new TableCell({borders:nbs,width:{size:HW,type:WidthType.DXA},
          margins:{top:0,bottom:0,left:0,right:0},verticalAlign:VerticalAlign.CENTER,
          children:[new Paragraph({spacing:{after:0},
            children:[new ImageRun({data:logoBytes,transformation:{width:130,height:50}})]})]
        }),
        new TableCell({borders:nbs,width:{size:MW,type:WidthType.DXA},
          margins:{top:0,bottom:0,left:0,right:0},verticalAlign:VerticalAlign.CENTER,
          children:[
            new Paragraph({alignment:AlignmentType.CENTER,spacing:{after:0},
              children:[new TextRun({text:'The Oregon Fruit Company',font:FONT,size:28,bold:true})]}),
            new Paragraph({alignment:AlignmentType.CENTER,spacing:{after:0},
              children:[new TextRun({text:'3180 22nd St SE, Salem, OR  97302 USA',font:FONT,size:20})]})
          ]
        }),
        new TableCell({borders:nbs,width:{size:HW,type:WidthType.DXA},
          margins:{top:0,bottom:0,left:0,right:0},verticalAlign:VerticalAlign.CENTER,
          children:[new Paragraph({spacing:{after:0},children:[]})]
        })
      ]})]
    }),
    new Paragraph({spacing:{after:0},children:[]})
  ]});

  const productCode=d.productName?d.productName.substring(0,30):'';
  const docFooter=new Footer({children:[
    new Paragraph({spacing:{after:0},
      tabStops:[{type:TabStopType.RIGHT,position:9360}],
      children:[run(productCode),run('\t'),run('Revised:  ')]}),
    new Paragraph({spacing:{after:0},
      tabStops:[{type:TabStopType.RIGHT,position:9360}],
      children:[run(''),run('\t'),run('Replaces:  ')]}),
  ]});

  const children=[];

  // Title block
  children.push(new Table({width:{size:9360,type:WidthType.DXA},columnWidths:[9360],
    borders:{top:nb,bottom:nb,left:nb,right:nb,insideHorizontal:nb,insideVertical:nb},
    rows:[new TableRow({children:[new TableCell({
      borders:{top:{style:BorderStyle.SINGLE,size:24,color:'000000'},
        bottom:{style:BorderStyle.SINGLE,size:24,color:'000000'},left:nb,right:nb},
      width:{size:9360,type:WidthType.DXA},margins:{top:80,bottom:80,left:0,right:0},
      children:[new Paragraph({alignment:AlignmentType.CENTER,spacing:{after:0},
        children:[new TextRun({text:'PRODUCT SPECIFICATION',font:FONT,size:28,bold:true})]})]
    })]})]}));
  children.push(sp(160));

  // Identification
  children.push(lv('PRODUCT:',d.productName));
  children.push(sp(60));
  if(state.lineId==='aseptic'){
    children.push(lv('ITEM NUMBER (DRUM):',d.drumItemNumber||'TBD'));
    children.push(lv('ITEM NUMBER (TOTE):',d.toteItemNumber||'TBD'));
  } else {
    children.push(lv('ITEM NUMBER:',d.itemNumber));
  }
  children.push(sp(60));
  children.push(lm('DESCRIPTION:',d.description));
  children.push(lm('INGREDIENTS:',d.ingredients));
  if(state.lineId==='canned'&&d.ingredientPct){
    children.push(lm('INGREDIENT PRIOR TO PACKAGING:',d.ingredientPct));
  }
  children.push(lm('PROCESSING:',ln.processing));

  // Physical properties
  children.push(sh('PHYSICAL PROPERTIES:'+(state.lineId==='aseptic'?' (physical properties vary due to seasonal variation of agricultural commodities)':'')));
  if(d.brix) children.push(sr('Brix:',d.brix));
  if(d.ph) children.push(sr('pH:',d.ph));
  if(d.viscosity) children.push(sr('Viscosity:',d.viscosity));
  if(d.specificGravity) children.push(sr('Specific Gravity:',d.specificGravity));
  if(d.pieceSize) children.push(sr('Piece Size:',d.pieceSize));
  if(state.lineId==='frozen-smooth') children.push(sr('Piece Size:','Pourable and smooth'));
  if(d.color) children.push(sr('Color:',d.color));
  if(d.flavor) children.push(sr('Flavor:',d.flavor));
  if(d.aroma) children.push(sr('Aroma:',d.aroma));
  if(d.defects) children.push(sr('Defects:',d.defects));
  if(d.pitsStems) children.push(sr('Pits/Stems:',d.pitsStems));

  // Canned grade standards
  if(state.lineId==='canned'){
    children.push(sh('GRADE STANDARDS:'));
    if(d.colorGrade) children.push(sr('Color:',d.colorGrade));
    if(d.defectsGrade) children.push(sr('Defects:',d.defectsGrade));
    if(d.characterGrade) children.push(sr('Character:',d.characterGrade));
    children.push(sh('PRODUCT CHARACTERISTICS:'));
    children.push(sr('Can Center Temp:','190°F minimum'));
    children.push(sr('Vacuum:','6 - 13 inches Hg'));
    children.push(sr('Headspace:','4 - 8 (1/16th inch gauge)'));
    if(d.minNetWeight) children.push(sr('Minimum Net Weight:',d.minNetWeight));
    if(d.minDrainedWeight) children.push(sr('Minimum Drained Weight:',d.minDrainedWeight));
  }

  // Micro spec table
  if(ln.microRows&&ln.microRows.length){
    children.push(sh('MICROBIOLOGICAL SPECIFICATIONS:'));
    const mw=7400,mcw=[2200,1700,3500];
    const allRows=[['Test','Limit','Method'],...ln.microRows];
    children.push(new Table({width:{size:mw,type:WidthType.DXA},columnWidths:mcw,
      indent:{size:TAB,type:WidthType.DXA},
      rows:allRows.map((r,i)=>new TableRow({children:[
        cell(r[0],{width:mcw[0],bold:i===0,align:i===0?AlignmentType.CENTER:AlignmentType.LEFT}),
        cell(r[1],{width:mcw[1],bold:i===0,align:AlignmentType.CENTER}),
        cell(r[2],{width:mcw[2],bold:i===0,align:AlignmentType.CENTER}),
      ]}))}));
  }

  // Metal detection
  const mNote=ln.metalNote==='inline'?'During production, inline metal detectors are challenged and calibrated hourly for adequate sensitivity to and rejection of the following test pieces:':ln.metalNote==='belt'?'During production, belt metal detectors are challenged and calibrated hourly for adequate sensitivity to and rejection of the following test pieces:':'The metal detector is continuously monitored and challenged at defined intervals.';
  children.push(sh('METAL DETECTION:'));
  children.push(new Paragraph({spacing:{after:60},indent:{left:TAB},children:[run(mNote)]}));
  children.push(metalRow('Ferrous',ln.metalF));
  children.push(metalRow('Non-Ferrous',ln.metalN));
  children.push(metalRow('Stainless Steel',ln.metalS));

  // Packaging
  children.push(sh('PACKAGING:'));
  children.push(new Paragraph({spacing:{after:0},indent:{left:TAB},children:[run(ln.packagingText)]}));

  // Lot code
  children.push(sh('LOT CODE FORMAT:'));
  ln.lotCode.split('\n').forEach(line=>{
    children.push(new Paragraph({spacing:{after:0},indent:{left:TAB},children:[run(line)]}));
  });

  // GTIN & Status
  children.push(sp(120));
  children.push(lv('GTIN:',d.caseGtin||'TBD'));
  children.push(sp(120));
  children.push(lm('STATUS:',status));

  // Best used by
  children.push(sh(state.lineId==='aseptic'?'EXPIRY AND STORAGE:':'BEST USED BY:'));
  if(best) best.forEach(b=>children.push(new Paragraph({spacing:{after:60},indent:{left:TAB},children:[run(b)]})));
  if(state.lineId!=='aseptic'){
    children.push(lm('STORAGE:',ln.storage));
  }

  // Shipping
  children.push(sh('SHIPPING INFORMATION:'));
  ship.forEach(([k,v])=>children.push(shipRow(k,v)));

  // Boilerplate
  children.push(sp(120));
  children.push(lm('ALLERGENS:',ALLERGEN));
  children.push(lm('NON-GMO:',NONGMO));
  ld('SAFETY DATA SHEET (SDS):',SDS_STMT).forEach(p=>children.push(p));

  // GRAS
  if(ln.hasGRAS){
    children.push(sh('GRAS:'));
    children.push(new Paragraph({spacing:{after:0},indent:{left:TAB},
      children:[run((d.productName||'This product')+' is generally recognized as safe as defined in 21 CFR 170.30(b)(2).')]}));
  }

  // Nutrition placeholder
  children.push(sh('NUTRITIONAL INFORMATION:'));
  const pgb={style:BorderStyle.SINGLE,size:4,color:'AAAAAA'};
  children.push(new Table({width:{size:6840,type:WidthType.DXA},columnWidths:[6840],
    indent:{size:TAB,type:WidthType.DXA},
    rows:[new TableRow({children:[new TableCell({
      borders:{top:pgb,left:pgb,bottom:pgb,right:pgb},
      width:{size:6840,type:WidthType.DXA},
      margins:{top:240,bottom:240,left:200,right:200},
      children:[new Paragraph({alignment:AlignmentType.CENTER,
        children:[new TextRun({text:'[Insert Nutrition Facts panel here]',
          font:FONT,size:SZ,italics:true,color:'777777'})]})]
    })]})]}));

  const doc=new Document({
    styles:{default:{document:{run:{font:FONT,size:SZ}}}},
    sections:[{
      properties:{page:{size:{width:12240,height:15840},
        margin:{top:1080,right:1440,bottom:1080,left:1440}}},
      headers:{default:docHeader},
      footers:{default:docFooter},
      children
    }]
  });

  const blob=await Packer.toBlob(doc);
  const name=(d.productName||'OFC_Spec').replace(/[^a-zA-Z0-9]/g,'_')+'_'+today+'.docx';
  saveAs(blob,name);
}

// ─────────────────────────────────────────
// COLLECT FORM DATA
// ─────────────────────────────────────────
function collectForm(){
  const fields=['productName','itemNumber','description','ingredients','brix','ph','viscosity',
    'color','flavor','aroma','defects','pitsStems','specificGravity','pieceSize',
    'bottleUpc','caseGtin','netWeight','grossWeight','daysAfterOpening',
    'drumItemNumber','toteItemNumber','dilutionRatio','juiceContent',
    'ingredientPct','minNetWeight','minDrainedWeight','colorGrade','defectsGrade','characterGrade',
    'tenOzUpc','twentyNineOzUpc'];
  const radios=['countryOfOrigin','pailSize','packFormats','jarSizes'];
  const d={};
  fields.forEach(f=>{const el=document.getElementById(f);if(el) d[f]=el.value.trim();});
  radios.forEach(r=>{const el=document.querySelector(`input[name="${r}"]:checked`);if(el) d[r]=el.value;});
  return d;
}

function updatePreview(){
  state.formData=collectForm();
  const pane=document.getElementById('preview-pane');
  if(pane) pane.innerHTML=buildPreview(state.formData);
}

// ─────────────────────────────────────────
// DEFAULT DESCRIPTION
// ─────────────────────────────────────────
function getDefaultDesc(){
  const d=state.formData;
  const n=d.productName||'[Product Name]';
  switch(state.lineId){
    case'frozen-compote':return`${n} are diced and mixed with a sweetened sauce and pasteurized. Product is packed in plastic jugs and frozen to maximize product quality.`;
    case'frozen-diced':return`${n.replace(/Diced.*/,'').trim()} are diced and mixed with a thickened, sweetened sauce, and frozen in 35 oz bottles.`;
    case'frozen-smooth':return`${n} puree is mixed with a thickened, sweetened sauce and pasteurized. ${n} is packed in 32 fl oz plastic bottles and frozen to maximize product quality.`;
    case'shelf-stable-smooth':return`${n} puree is mixed with a thickened, sweetened sauce and pasteurized. ${n} is packed in 32 fl oz net volume plastic bottles.`;
    case'shelf-stable-conc':return`Beverage concentrate with a sweetened juice blend and pasteurized. Contains ${d.juiceContent||'[X]% juice'} when prepared as ${d.dilutionRatio||'[ratio]'}.`;
    case'aseptic':return`${n} is prepared from ripened, washed and sorted fruit. The product contains no preservatives and no additives. The puree is treated with pectinase, amylase, and cellulase enzymes as processing aids and processed through a final finisher screen that is 0.033".`;
    default:return n;
  }
}

// ─────────────────────────────────────────
// EVENT HANDLERS
// ─────────────────────────────────────────
function attachHandlers(){
  // Line cards
  document.querySelectorAll('.line-card').forEach(el=>{
    el.addEventListener('click',()=>{
      state.lineId=el.dataset.line;
      document.querySelectorAll('.line-card').forEach(c=>c.classList.remove('sel'));
      el.classList.add('sel');
      const btn=document.getElementById('step1-next');
      if(btn) btn.disabled=false;
    });
  });

  // Navigation
  const s1n=document.getElementById('step1-next');
  if(s1n) s1n.addEventListener('click',()=>{state.step=2;render();});

  const s2b=document.getElementById('step2-back');
  if(s2b) s2b.addEventListener('click',()=>{state.step=1;render();});
  const s2n=document.getElementById('step2-next');
  if(s2n) s2n.addEventListener('click',()=>{state.formData=collectForm();state.step=3;render();});

  const s3b=document.getElementById('step3-back');
  if(s3b) s3b.addEventListener('click',()=>{state.step=2;render();});
  const s3n=document.getElementById('step3-next');
  if(s3n) s3n.addEventListener('click',()=>{state.step=4;render();});

  const s4b=document.getElementById('step4-back');
  if(s4b) s4b.addEventListener('click',()=>{state.step=3;render();});
  const so=document.getElementById('start-over');
  if(so) so.addEventListener('click',()=>{state.step=1;state.lineId=null;state.formData={};render();});

  // Fill default description
  const fd=document.getElementById('fill-desc');
  if(fd) fd.addEventListener('click',()=>{
    state.formData=collectForm();
    const desc=getDefaultDesc();
    const el=document.getElementById('description');
    if(el){el.value=desc;state.formData.description=desc;updatePreview();}
  });

  // Live preview on form change
  const formInputs=document.querySelectorAll('#app-root input,#app-root textarea,#app-root select');
  formInputs.forEach(el=>el.addEventListener('input',updatePreview));
  formInputs.forEach(el=>el.addEventListener('change',updatePreview));

  // Export buttons
  const dlDocx=document.getElementById('dl-docx');
  if(dlDocx) dlDocx.addEventListener('click',async()=>{
    dlDocx.disabled=true;dlDocx.innerHTML='<span class="spin"></span> Generating…';
    try{await generateDocx();toast('✅ .docx downloaded!');}
    catch(e){toast('⚠ Error: '+e.message,4000);console.error(e);}
    dlDocx.disabled=false;dlDocx.innerHTML='⬇ Download .docx';
  });

  const dlPdf=document.getElementById('dl-pdf');
  if(dlPdf) dlPdf.addEventListener('click',()=>{
    const pa=document.getElementById('print-area');
    if(pa) pa.classList.remove('hidden');
    window.print();
    setTimeout(()=>{if(pa) pa.classList.add('hidden');},1000);
  });

  const ct=document.getElementById('copy-text');
  if(ct) ct.addEventListener('click',()=>{
    navigator.clipboard.writeText(buildPlainText()).then(()=>toast('✅ Copied to clipboard!'));
  });

  const ca=document.getElementById('copy-asana');
  if(ca) ca.addEventListener('click',()=>{
    navigator.clipboard.writeText(buildAsanaTask()).then(()=>toast('✅ Asana task details copied!'));
  });

  // Step navigation clicks
  document.querySelectorAll('.step').forEach(el=>{
    el.addEventListener('click',()=>{
      const s=+el.dataset.step;
      if(s<state.step){state.step=s;render();}
    });
  });
}

// ─────────────────────────────────────────
